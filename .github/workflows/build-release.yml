name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up Environment
        run: |
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Clean up temporary or corrupt Gradle wrapper
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew
          rm -f gradlew.bat

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1
          validate-wrappers: false

      - name: Generate clean local gradle-wrapper
        run: gradle wrapper --gradle-version 9.3.1 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ""
          STORE_PASSWORD: ""
          KEY_PASSWORD: ""

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine Release Tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Download APK from Build Job
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: .

      - name: Rename APK for Release
        run: mv app-release.apk parents-control-${{ env.TAG_NAME }}.apk

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: parents-control-${{ env.TAG_NAME }}.apk
          name: Release ${{ env.TAG_NAME }}
          body: |
            Automated production build from GitHub Actions workflow.
            
            **App Version:** ${{ env.TAG_NAME }}
            **Latest Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
